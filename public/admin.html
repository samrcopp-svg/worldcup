<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · World Cup Sweepstake</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    main { max-width: 640px; }
    .keyrow { display: flex; gap: 8px; margin-bottom: 12px; }
    .keyrow input { flex: 1; padding: 10px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; }
    .keyrow button { padding: 0 14px; border: none; border-radius: 8px; background: var(--accent); color: #fff; font-weight: 600; }
    .arow { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--line); }
    .arow .tn { flex: 1; font-weight: 600; }
    .arow .ow { color: var(--muted); font-size: 12px; width: 70px; }
    .arow select { padding: 7px; border: 1px solid var(--line); border-radius: 8px; }
    #status { font-size: 13px; color: var(--accent); min-height: 18px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Admin</h1>
    <p class="sub">Group scores update automatically. Use this only to set how far a team reached in the knockouts if the auto-detect needs a nudge.</p>
  </header>
  <main>
    <section class="card">
      <div class="keyrow">
        <input id="key" type="password" placeholder="Admin key" />
        <button onclick="saveKey()">Save key</button>
      </div>
      <div id="status"></div>
      <div id="rows"></div>
    </section>
    <footer><a href="index.html">← Back to leaderboard</a></footer>
  </main>
  <script>
    let STAGES = [];
    const key = () => localStorage.getItem('wc_admin_key') || '';
    function saveKey() { localStorage.setItem('wc_admin_key', document.getElementById('key').value.trim()); setStatus('Key saved on this device.'); }
    const setStatus = s => document.getElementById('status').textContent = s;

    async function load() {
      document.getElementById('key').value = key();
      const data = await (await fetch('/api/teams')).json();
      STAGES = data.stages;
      const opts = `<option value="">Auto / Group stage</option>` + STAGES.map(s => `<option value="${s.key}">${s.label}</option>`).join('');
      document.getElementById('rows').innerHTML = data.teams.map(t => `
        <div class="arow">
          <span class="tn">${t.name}</span><span class="ow">${t.owner}</span>
          <select data-team="${t.name}" onchange="update(this)">${opts}</select>
        </div>`).join('');
      Object.entries(data.overrides).forEach(([team, stage]) => {
        const sel = document.querySelector(`select[data-team="${CSS.escape(team)}"]`);
        if (sel) sel.value = stage;
      });
    }

    async function update(sel) {
      const res = await fetch('/api/admin/override', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-key': key() },
        body: JSON.stringify({ team: sel.getAttribute('data-team'), stage: sel.value }),
      });
      const j = await res.json();
      setStatus(res.ok ? `Saved ${sel.getAttribute('data-team')} → ${sel.value || 'auto'}` : 'Error: ' + j.error);
    }
    load();
  </script>
</body>
</html>
